server:
    verbosity: 1
    interface: 127.0.0.1
    port: 5335
    do-ip4: yes
    do-udp: yes
    do-tcp: yes
    do-ip6: no
    prefer-ip6: no

    # DNSSEC
    harden-glue: yes
    harden-dnssec-stripped: yes
    use-caps-for-id: no
    edns-buffer-size: 1232

    # TCP tuning — prevents Pi-hole FTL "Connection prematurely closed" errors
    # Pi-hole pools TCP connections to Unbound. If idle-timeout is too low,
    # Unbound closes the connection and Pi-hole logs warnings on reconnect.
    tcp-idle-timeout: 120000
    incoming-num-tcp: 20
    outgoing-num-tcp: 20

    # Performance
    prefetch: yes
    num-threads: 1
    so-rcvbuf: 1m

    # Access control — allow all RFC1918 ranges
    access-control: 127.0.0.0/8 allow
    access-control: 10.0.0.0/8 allow
    access-control: 172.16.0.0/12 allow
    access-control: 192.168.0.0/16 allow

    # Rebinding protection
    private-address: 192.168.0.0/16
    private-address: 169.254.0.0/16
    private-address: 172.16.0.0/12
    private-address: 10.0.0.0/8
    private-address: fd00::/8
    private-address: fe80::/10

    # Resilience — serve stale cache during upstream outages
    # instead of returning SERVFAIL
    infra-host-ttl: 60
    infra-cache-min-rtt: 50
    serve-expired: yes
    serve-expired-ttl: 86400
    serve-expired-client-timeout: 1800
    serve-expired-reply-ttl: 30
